<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Ummat | Dompet Digital Ummat</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#108ee9">
    <link rel="apple-touch-icon" href="ummat.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { --dana-blue: #108ee9; --dana-dark-blue: #0a7cc2; --white: #ffffff; --bg-light: #f5f5f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-light); color: #333; overflow-x: hidden; padding-bottom: 90px; }
        .blue-section { background: var(--dana-blue); height: 230px; padding: 25px 5%; color: white; position: relative; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .app-name { font-weight: 800; font-size: 20px; letter-spacing: 1px; }
        .app-name span { color: #ffeb3b; }
        .saldo-area { display: flex; flex-direction: column; align-items: center; gap: 5px; margin-top: 10px; }
        .saldo-label { font-size: 11px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }
        .saldo-val { font-size: 26px; font-weight: 800; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .quick-actions { display: flex; justify-content: space-around; text-align: center; margin-top: 25px; }
        .action-item { cursor: pointer; transition: 0.2s; }
        .action-item i { font-size: 24px; margin-bottom: 8px; display: block; }
        .action-item p { font-size: 11px; font-weight: 600; }
        .main-container { padding: 0 15px; margin-top: -25px; position: relative; z-index: 10; }
        .app-landing-card { background: white; border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; }
        .app-img { width: 80px; height: 80px; border-radius: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .app-img img { width: 100%; height: 100%; object-fit: contain; }
        .app-text h2 { font-size: 15px; font-weight: 700; color: var(--dana-blue); }
        .app-text p { font-size: 10px; color: #777; margin: 4px 0 10px; }
        .btn-download { background: var(--dana-blue); color: white; border: none; padding: 7px 15px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .menu-white-box { background: var(--white); border-radius: 25px; padding: 25px 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .menu-item { display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer; }
        .icon-box { width: 50px; height: 50px; border-radius: 18px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .bg-infaq { background: #e8f5e9; color: #2e7d32; }
        .bg-jamaah { background: #fff3e0; color: #ef6c00; }
        .bg-sholat { background: #e3f2fd; color: #1565c0; }
        .bg-sosial { background: #fce4ec; color: #c2185b; }
        .bg-jadwal { background: #f3e5f5; color: #7b1fa2; }
        .bg-kas { background: #e0f7fa; color: #00838f; }
        .bg-laporan { background: #eceff1; color: #455a64; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--white); border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { text-align: center; color: #aaa; font-size: 10px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--dana-blue); }
        .scan-btn { width: 65px; height: 65px; background: var(--dana-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; margin-top: -40px; border: 6px solid var(--bg-light); box-shadow: 0 8px 15px rgba(16, 142, 233, 0.3); }
    </style>
</head>
<body>
    <div class="blue-section">
        <div class="top-bar">
            <div class="app-name">E-<span>UMMAT</span></div>
            <i class="fas fa-comment-dots" style="font-size: 22px;"></i>
        </div>
        <div class="saldo-area">
            <div class="saldo-label">Total Saldo Terverifikasi</div>
            <div class="saldo-val" onclick="toggleMata()">
                <span id="angka-saldo">Rp 0</span>
                <i id="icon-mata" class="far fa-eye" style="font-size: 16px; opacity: 0.6;"></i>
            </div>
        </div>
        <div class="quick-actions">
            <div class="action-item" onclick="location.href='infaq.html'"><i class="fas fa-plus-circle"></i><p>Isi Saldo</p></div>
            <div class="action-item" onclick="location.href='laporan.html'"><i class="fas fa-paper-plane"></i><p>Kirim</p></div>
            <div class="action-item" onclick="location.href='laporan.html'"><i class="fas fa-history"></i><p>Riwayat</p></div>
            <div class="action-item" onclick="alert('Fitur segera hadir!')"><i class="fas fa-th-large"></i><p>Lainnya</p></div>
        </div>
    </div>

    <div class="main-container">
        <div class="app-landing-card">
            <div class="app-img"><img src="ummat.png" alt="Logo"></div>
            <div class="app-text">
                <h2>Install E-Ummat di HP</h2>
                <p>Nikmati akses cepat & aman tanpa browser.</p>
                <button class="btn-download" onclick="showInstallInfo()">DOWNLOAD SEKARANG</button>
            </div>
        </div>
        <div class="menu-white-box">
            <div class="menu-item" onclick="location.href='infaq.html'"><div class="icon-box bg-infaq"><i class="fas fa-hand-holding-heart"></i></div><h3>Infaq</h3></div>
            <div class="menu-item" onclick="location.href='jamaah.html'"><div class="icon-box bg-jamaah"><i class="fas fa-users"></i></div><h3>Jamaah</h3></div>
            <div class="menu-item" onclick="location.href='waktusholat.html'"><div class="icon-box bg-sholat"><i class="fas fa-mosque"></i></div><h3>Sholat</h3></div>
            <div class="menu-item" onclick="location.href='sosial.html'"><div class="icon-box bg-sosial"><i class="fas fa-heart"></i></div><h3>Sosial</h3></div>
            <div class="menu-item" onclick="location.href='jadwal.html'"><div class="icon-box bg-jadwal"><i class="fas fa-calendar-alt"></i></div><h3>Jadwal</h3></div>
            <div class="menu-item" onclick="location.href='kalender.html'"><div class="icon-box bg-kas" style="color:#00838f"><i class="fas fa-calendar-check"></i></div><h3>Kaldik</h3></div>
            <div class="menu-item" onclick="location.href='inventaris.html'"><div class="icon-box bg-laporan"><i class="fas fa-box"></i></div><h3>Barang</h3></div>
            <div class="menu-item" onclick="location.href='laporan.html'"><div class="icon-box bg-laporan" style="color:var(--dana-blue)"><i class="fas fa-file-invoice-dollar"></i></div><h3>Laporan</h3></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i> Beranda</div>
        <div class="nav-item" onclick="location.href='laporan.html'"><i class="fas fa-wallet"></i> Dompet</div>
        <div class="scan-btn" onclick="location.href='infaq.html'"><i class="fas fa-qrcode"></i></div>
        <div class="nav-item"><i class="fas fa-bell"></i> Pesan</div>
        <div class="nav-item"><i class="fas fa-user-circle"></i> Saya</div>
    </div>

    <script>
        let isHidden = false;
        let totalSaldo = 0;
        function syncSaldo() {
            const data = JSON.parse(localStorage.getItem('kas_ledger')) || [];
            let tempTotal = 0;
            data.forEach(t => {
                const amt = parseInt(t.nominal) || 0;
                if(t.tipe === 'masuk') tempTotal += amt; else tempTotal -= amt;
            });
            totalSaldo = tempTotal;
            renderSaldo();
        }
        function toggleMata() { isHidden = !isHidden; renderSaldo(); }
        function renderSaldo() {
            const display = document.getElementById('angka-saldo');
            const icon = document.getElementById('icon-mata');
            if(isHidden) { display.innerText = "Rp •••••••"; icon.className = "far fa-eye-slash"; }
            else { display.innerText = "Rp " + totalSaldo.toLocaleString('id-ID'); icon.className = "far fa-eye"; }
        }
        function showInstallInfo() { alert("Klik 'Tambahkan ke Layar Utama' di menu browser Anda."); }
        window.onload = syncSaldo;
    </script>
</body>
</html>
