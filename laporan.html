<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Laporan Blockchain | Master Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --dana-blue: #108ee9;
            --blue-dark: #1e3a8a;
            --white: #ffffff;
            --bg-light: #f4f7fa;
            --green: #10b981;
            --red: #ef4444;
            --excel-green: #1d6f42;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-light); padding-bottom: 50px; }

        .header-laporan {
            background: var(--dana-blue); padding: 30px 20px; color: white;
            border-radius: 0 0 25px 25px; display: flex; align-items: center; gap: 15px;
        }

        .container { padding: 0 15px; margin-top: -20px; }

        /* REKAP CARD */
        .rekap-card {
            background: white; border-radius: 20px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        .balance-info { text-align: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .rekap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .rekap-item p { font-size: 10px; color: #888; font-weight: 700; text-transform: uppercase; }

        /* LIST TRANSAKSI (GAYA LEDGER) */
        .transaksi-list { background: white; border-radius: 20px; padding: 10px; overflow: hidden; }
        .tr-item {
            padding: 15px 10px; border-bottom: 1px solid #f1f5f9;
            display: flex; flex-direction: column; gap: 5px;
        }
        .tr-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .tr-info h4 { font-size: 13px; color: var(--blue-dark); font-weight: 700; }
        .tr-info span { font-size: 10px; color: #aaa; }
        .tr-amount { font-size: 14px; font-weight: 800; }
        
        /* HASH STYLING */
        .hash-box { 
            font-family: 'JetBrains Mono', monospace; font-size: 9px; 
            background: #f8fafc; padding: 5px; border-radius: 6px;
            color: var(--dana-blue); border: 1px solid #edf2f7;
            display: flex; justify-content: space-between;
        }

        .action-btns { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-action {
            border: none; width: 100%; padding: 15px; border-radius: 12px;
            font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-excel { background: var(--excel-green); color: white; }

        .t-masuk { color: var(--green); }
        .t-keluar { color: var(--red); }
    </style>
</head>
<body>

    <div class="header-laporan">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <h2 style="font-weight: 800; font-size: 18px;">AUDIT LEDGER BLOCKCHAIN</h2>
    </div>

    <div class="container">
        <div class="rekap-card">
            <div class="balance-info">
                <p style="font-size: 11px; color: #888;">SALDO TERVERIFIKASI (LEDGER)</p>
                <h2 id="total-saldo" style="color: var(--dana-blue);">Rp 0</h2>
            </div>
            <div class="rekap-grid">
                <div class="rekap-item" style="border-right: 1px solid #eee;">
                    <p>Total Pemasukan</p>
                    <h3 class="t-masuk" id="total-masuk">Rp 0</h3>
                </div>
                <div class="rekap-item" style="padding-left: 10px;">
                    <p>Total Pengeluaran</p>
                    <h3 class="t-keluar" id="total-keluar">Rp 0</h3>
                </div>
            </div>
        </div>

        <div class="transaksi-list" id="list-history">
            </div>

        <div class="action-btns">
            <button class="btn-action btn-excel" onclick="exportBlockchainToExcel()">
                <i class="fas fa-file-excel"></i> EXPORT BLOCKCHAIN LEDGER (.XLSX)
            </button>
            <button class="btn-action" style="background: #555; color: white;" onclick="window.print()">
                <i class="fas fa-print"></i> CETAK BUKTI AUDIT
            </button>
        </div>
    </div>

    <script>
        function loadBlockchainData() {
            // AMBIL DATA DARI kas_ledger (Kunci yang sama dengan infaq.html Bos)
            const ledger = JSON.parse(localStorage.getItem('kas_ledger')) || [];
            const list = document.getElementById('list-history');
            
            let tMasuk = 0, tKeluar = 0;
            let html = "";

            if (ledger.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:40px; color:#ccc; font-size:12px;">Belum ada blok transaksi terverifikasi.</div>`;
                return;
            }

            // Render data (Urutan terbaru di atas)
            [...ledger].reverse().forEach(block => {
                const isMasuk = block.tipe === 'masuk';
                const amt = parseInt(block.nominal) || 0;
                
                if(isMasuk) tMasuk += amt; else tKeluar += amt;

                html += `
                    <div class="tr-item">
                        <div class="tr-top">
                            <div class="tr-info">
                                <h4>${block.person}</h4>
                                <span>${block.waktu} | ${block.keterangan}</span>
                            </div>
                            <div class="tr-amount ${isMasuk ? 't-masuk' : 't-keluar'}">
                                ${isMasuk ? '+' : '-'} Rp ${amt.toLocaleString('id-ID')}
                            </div>
                        </div>
                        <div class="hash-box">
                            <span>HASH: ${block.currentHash}</span>
                            <span style="color:#cbd5e1">PREV: ${block.prevHash}</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-masuk').innerText = "Rp " + tMasuk.toLocaleString('id-ID');
            document.getElementById('total-keluar').innerText = "Rp " + tKeluar.toLocaleString('id-ID');
            document.getElementById('total-saldo').innerText = "Rp " + (tMasuk - tKeluar).toLocaleString('id-ID');
            list.innerHTML = html;
        }

        // EXPORT EXCEL KHUSUS BLOCKCHAIN (Menyertakan Hash untuk Audit)
        function exportBlockchainToExcel() {
            const ledger = JSON.parse(localStorage.getItem('kas_ledger')) || [];
            if (ledger.length === 0) return alert("Ledger kosong!");

            const header = [["LAPORAN KEUANGAN BERBASIS BLOCKCHAIN (MASTER PRO)"]];
            header.push(["Waktu", "Penyetor", "Keterangan", "Nominal", "Tipe", "Hash Transaksi", "Prev Hash"]);

            const rows = ledger.map(b => [
                b.waktu, b.person, b.keterangan, b.nominal, b.tipe, b.currentHash, b.prevHash
            ]);

            const worksheet = XLSX.utils.aoa_to_sheet(header.concat(rows));
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Ledger_Audit");

            XLSX.writeFile(workbook, "Audit_Blockchain_Yayasan.xlsx");
        }

        window.onload = loadBlockchainData;
    </script>
</body>
</html>
