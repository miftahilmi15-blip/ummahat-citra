<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Ledger | Master Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --dana-blue: #108ee9;
            --blue-dark: #1e3a8a;
            --white: #ffffff;
            --bg-light: #f4f7fa;
            --green: #10b981;
            --red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-light); padding-bottom: 50px; }

        .header-laporan {
            background: var(--dana-blue); padding: 30px 20px 50px; color: white;
            border-radius: 0 0 30px 30px; text-align: center;
        }

        .container { padding: 0 15px; margin-top: -40px; }

        /* SALDO UTAMA (TIDAK BERUBAH OLEH FILTER) */
        .main-balance-card {
            background: var(--blue-dark); color: white; border-radius: 20px;
            padding: 20px; text-align: center; box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2);
            margin-bottom: 15px;
        }

        /* FILTER BOX */
        .filter-section {
            background: white; border-radius: 15px; padding: 15px;
            margin-bottom: 15px; display: flex; gap: 10px; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        select {
            flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #eee;
            font-size: 13px; outline: none; background: #f9f9f9;
        }

        /* REKAP PERIODIK */
        .rekap-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;
        }
        .rekap-item {
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .rekap-item p { font-size: 10px; color: #888; font-weight: 700; text-transform: uppercase; }
        .rekap-item h3 { font-size: 14px; margin-top: 5px; }

        /* LIST */
        .transaksi-list { background: white; border-radius: 20px; padding: 10px; }
        .tr-item {
            padding: 12px 10px; border-bottom: 1px solid #f1f5f9;
        }
        .tr-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .tr-info h4 { font-size: 13px; color: var(--blue-dark); }
        .tr-info span { font-size: 10px; color: #aaa; }
        .hash-tag { font-family: 'JetBrains Mono'; font-size: 8px; color: var(--dana-blue); margin-top: 5px; display: block; }

        .btn-excel {
            background: #1d6f42; color: white; border: none; width: 100%;
            padding: 15px; border-radius: 15px; font-weight: 700; margin-top: 15px;
            cursor: pointer;
        }
        
        .t-masuk { color: var(--green); }
        .t-keluar { color: var(--red); }
    </style>
</head>
<body>

    <div class="header-laporan">
        <h2 style="font-size: 18px;">LAPORAN BLOCKCHAIN</h2>
    </div>

    <div class="container">
        <div class="main-balance-card">
            <p style="font-size: 11px; opacity: 0.8; letter-spacing: 1px;">TOTAL SALDO KAS GLOBAL</p>
            <h1 id="global-saldo">Rp 0</h1>
        </div>

        <div class="filter-section">
            <i class="fas fa-filter" style="color: var(--dana-blue)"></i>
            <select id="filter-time" onchange="loadLaporan()">
                <option value="all">Semua Waktu</option>
                <option value="today">Hari Ini</option>
                <option value="month">Bulan Ini</option>
            </select>
        </div>

        <div class="rekap-grid">
            <div class="rekap-item">
                <p>Masuk (Filter)</p>
                <h3 class="t-masuk" id="filter-masuk">Rp 0</h3>
            </div>
            <div class="rekap-item">
                <p>Keluar (Filter)</p>
                <h3 class="t-keluar" id="filter-keluar">Rp 0</h3>
            </div>
        </div>

        <div class="transaksi-list" id="list-history"></div>

        <button class="btn-excel" onclick="exportToExcel()">
            <i class="fas fa-file-excel"></i> DOWNLOAD LAPORAN EXCEL
        </button>
    </div>

    <script>
        function loadLaporan() {
            const ledger = JSON.parse(localStorage.getItem('kas_ledger')) || [];
            const filterVal = document.getElementById('filter-time').value;
            const list = document.getElementById('list-history');
            
            let globalTotal = 0;
            let fMasuk = 0;
            let fKeluar = 0;
            let html = "";

            // Ambil waktu sekarang untuk filter
            const now = new Date();
            const todayStr = now.toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'});
            const monthStr = now.toLocaleDateString('id-ID', {month:'short', year:'numeric'});

            // 1. Hitung Saldo Global (Selalu dari semua data)
            ledger.forEach(b => {
                const amt = parseInt(b.nominal) || 0;
                if(b.tipe === 'masuk') globalTotal += amt; else globalTotal -= amt;
            });

            // 2. Filter data untuk ditampilkan
            const filteredData = ledger.filter(b => {
                if(filterVal === 'today') return b.waktu.includes(todayStr);
                if(filterVal === 'month') return b.waktu.includes(monthStr);
                return true;
            });

            // 3. Render & Hitung Rekap Filter
            [...filteredData].reverse().forEach(block => {
                const isMasuk = block.tipe === 'masuk';
                const amt = parseInt(block.nominal) || 0;
                
                if(isMasuk) fMasuk += amt; else fKeluar += amt;

                html += `
                    <div class="tr-item">
                        <div class="tr-top">
                            <div class="tr-info">
                                <h4>${block.person}</h4>
                                <span>${block.waktu} | ${block.keterangan}</span>
                            </div>
                            <div class="tr-amount ${isMasuk ? 't-masuk' : 't-keluar'}">
                                ${isMasuk ? '+' : '-'} ${amt.toLocaleString('id-ID')}
                            </div>
                        </div>
                        <span class="hash-tag">ID: ${block.currentHash}</span>
                    </div>
                `;
            });

            // Update UI
            document.getElementById('global-saldo').innerText = "Rp " + globalTotal.toLocaleString('id-ID');
            document.getElementById('filter-masuk').innerText = "Rp " + fMasuk.toLocaleString('id-ID');
            document.getElementById('filter-keluar').innerText = "Rp " + fKeluar.toLocaleString('id-ID');
            list.innerHTML = html || "<p style='text-align:center; padding:20px; color:#ccc;'>Tidak ada data periode ini</p>";
        }

        function exportToExcel() {
            const ledger = JSON.parse(localStorage.getItem('kas_ledger')) || [];
            const worksheet = XLSX.utils.json_to_sheet(ledger);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Ledger");
            XLSX.writeFile(workbook, "Laporan_MasterPro_Blockchain.xlsx");
        }

        window.onload = loadLaporan;
    </script>
</body>
</html>
