<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventaris & Audit Kerusakan | Master Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --dana-blue: #108ee9;
            --white: #ffffff;
            --bg-light: #f5f5f5;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-light); padding-bottom: 80px; }

        .header-inv {
            background: var(--dana-blue); padding: 30px 20px; color: white;
            border-radius: 0 0 25px 25px; display: flex; align-items: center; gap: 15px;
        }

        .container { padding: 0 15px; margin-top: 20px; }

        /* CARD STATISTIK BULANAN */
        .stat-bulanan {
            background: linear-gradient(135deg, #108ee9, #0a7cc2);
            border-radius: 20px; padding: 20px; color: white; margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(16, 142, 233, 0.2);
        }
        .stat-bulanan h3 { font-size: 12px; opacity: 0.8; text-transform: uppercase; }
        .stat-bulanan p { font-size: 24px; font-weight: 800; margin-top: 5px; }

        /* FORM LAPOR */
        .form-lapor {
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .form-lapor h3 { font-size: 15px; margin-bottom: 15px; color: var(--dana-blue); }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 10px; font-weight: 800; color: #888; margin-bottom: 5px; }
        
        input, textarea {
            width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; font-size: 13px; outline: none; background: #fafafa;
        }

        .btn-submit {
            background: var(--danger); color: white; border: none; width: 100%; padding: 15px;
            border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        /* RIWAYAT LAPORAN */
        .log-container { margin-top: 25px; }
        .log-item {
            background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px;
            border-left: 4px solid var(--danger); font-size: 12px;
        }
        .log-date { font-size: 9px; color: #aaa; font-weight: 700; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div class="header-inv">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <h2 style="font-weight: 800; font-size: 18px;">LAPOR KERUSAKAN</h2>
    </div>

    <div class="container">
        <div class="stat-bulanan">
            <h3 id="current-month">Total Kerusakan (Maret 2026)</h3>
            <p id="total-count">0 Laporan</p>
            <span style="font-size: 10px; opacity: 0.7;">*Data akan di-reset setiap awal bulan.</span>
        </div>

        <div class="form-lapor">
            <h3><i class="fas fa-edit"></i> Form Input Data</h3>
            
            <div class="form-group">
                <label>NAMA BARANG</label>
                <input type="text" id="inp-barang" placeholder="Ketik nama barang...">
            </div>

            <div class="form-group">
                <label>DETAIL KERUSAKAN</label>
                <textarea id="inp-detail" placeholder="Jelaskan kendalanya..."></textarea>
            </div>

            <button class="btn-submit" onclick="simpanLaporan()">
                <i class="fas fa-save"></i> SIMPAN & CATAT WAKTU
            </button>
        </div>

        <div class="log-container">
            <h4 style="font-size: 13px; margin-bottom: 10px; color: #666;">AKTIVITAS TERAKHIR</h4>
            <div id="log-list">
                </div>
        </div>
    </div>

    <script>
        // Inisialisasi Data dari LocalStorage
        let laporanKerusakan = JSON.parse(localStorage.getItem('db_kerusakan')) || [];

        function simpanLaporan() {
            const barang = document.getElementById('inp-barang').value;
            const detail = document.getElementById('inp-detail').value;
            
            if(!barang || !detail) return alert("Lengkapi data dulu Bos!");

            const sekarang = new Date();
            const dataBaru = {
                id: Date.now(),
                nama: barang,
                deskripsi: detail,
                jam: sekarang.getHours().toString().padStart(2, '0') + ":" + sekarang.getMinutes().toString().padStart(2, '0'),
                tanggal: sekarang.getDate(),
                bulan: sekarang.getMonth() + 1, // Bulan dimulai dari 0
                tahun: sekarang.getFullYear(),
                fullDate: sekarang.toLocaleString('id-ID')
            };

            laporanKerusakan.push(dataBaru);
            localStorage.setItem('db_kerusakan', JSON.stringify(laporanKerusakan));
            
            alert("Berhasil dicatat pada jam " + dataBaru.jam);
            renderData();
            
            // Clear input
            document.getElementById('inp-barang').value = "";
            document.getElementById('inp-detail').value = "";
        }

        function renderData() {
            const list = document.getElementById('log-list');
            const totalCountText = document.getElementById('total-count');
            const now = new Date();
            const bulanSekarang = now.getMonth() + 1;
            const tahunSekarang = now.getFullYear();

            // Hitung kalkulasi bulan ini saja
            const filterBulanIni = laporanKerusakan.filter(item => item.bulan === bulanSekarang && item.tahun === tahunSekarang);
            totalCountText.innerText = filterBulanIni.length + " Laporan";

            // Render List (5 Terakhir)
            list.innerHTML = laporanKerusakan.slice().reverse().slice(0, 5).map(item => `
                <div class="log-item">
                    <span class="log-date">${item.fullDate} WIB</span>
                    <strong>${item.nama}</strong><br>
                    <span style="color:#666">${item.deskripsi}</span>
                </div>
            `).join('');
        }

        window.onload = renderData;
    </script>
</body>
</html>
